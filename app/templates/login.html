{% extends "base.html" %}
{% block title %}Teacher Portal Authentication{% endblock %}

{% block content %}
<section style="max-width: 420px; margin: 5rem auto; padding: 2.5rem; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center;">
  <h2 style="color: #212529; margin-bottom: 0.5rem; font-size: 1.6rem;">AttendEase Management</h2>
  <p style="color: #6c757d; margin-bottom: 2rem; font-size: 0.95rem;">Please enter your access password to unlock admin tools.</p>
  
  {% if error %}
    <p style="color: #842029; background-color: #f8d7da; border: 1px solid #f5c2c7; padding: 0.75rem; border-radius: 4px; margin-bottom: 1.5rem; font-size: 0.9rem;">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/login">
    <div style="margin-bottom: 1.5rem; text-align: left;">
      <label for="password" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #495057; font-size: 0.9rem;">Teacher Password</label>
      <input type="password" id="password" name="password" required autofocus style="width: 100%; padding: 0.75rem; border: 1px solid #ced4da; border-radius: 4px; font-size: 1rem; box-sizing: border-box;">
    </div>
    
    <button type="submit" class="btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem; font-weight: 600; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px;">Sign In</button>
  </form>
</section>
{% endblock %}
